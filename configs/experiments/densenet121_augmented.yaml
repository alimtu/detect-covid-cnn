# Augmentation study: heavier augmentation on top of the DenseNet121 baseline.
# Demonstrates that every augmentation is toggled/tuned purely from config.
base: densenet121.yaml

experiment:
  name: densenet121_augmented

augmentation:
  random_vertical_flip:
    enabled: true
    p: 0.5
  random_affine:
    enabled: true
    degrees: 10
    translate: [0.05, 0.05]
    scale: [0.9, 1.1]
    p: 0.5
  color_jitter:
    enabled: true
    brightness: 0.2
    contrast: 0.2
    p: 0.5
  gaussian_blur:
    enabled: true
    kernel_size: 3
    sigma: [0.1, 1.5]
    p: 0.3
